<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Barlow',sans-serif;
  background:#f1f5fb;
}

/* NAV */
nav{
  background:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  font-weight:900;
  font-size:22px;
  color:#1A6BFF;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}
.hero h1{
  font-size:38px;
  font-weight:900;
}
.hero span{ color:#1A6BFF; }

/* FILTRO */
.filters{
  text-align:center;
  margin-bottom:20px;
}
select{
  padding:10px;
  border-radius:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:15px;
  display:flex;
  flex-direction:column;
  border:1px solid #eee;
}

.card img{
  height:130px;
  object-fit:contain;
}

.name{ font-weight:700; }
.price{
  font-size:20px;
  font-weight:900;
  color:#0A58FF;
}

.btn{
  margin-top:auto;
  background:#1A6BFF;
  color:white;
  text-align:center;
  padding:10px;
  border-radius:50px;
  text-decoration:none;
  font-weight:800;
}
</style>
</head>

<body>

<nav>
<div class="logo">NEXO Digital</div>
</nav>

<section class="hero">
<h1>Celulares que <span>sí valen la pena</span></h1>
</section>

<div class="filters">
<select id="filtro">
<option value="">Todas</option>
<option value="apple">Apple</option>
<option value="samsung">Samsung</option>
<option value="xiaomi">Xiaomi</option>
</select>
</div>

<div class="grid" id="catalogo"></div>

<script>

/* 🔥 AQUÍ EDITAS TODO (TU “EXCEL”) */
const productos = [

{nombre:"iPhone 17 Pro Max 256GB", precio:5300000, marca:"apple", img:"https://i.ibb.co/Pss5GmJn/iphone17promax.png"},
{nombre:"iPhone 16 Pro 128GB", precio:4200000, marca:"apple", img:"https://i.ibb.co/0jqHpnp/iphone16pro.png"},

{nombre:"Samsung S26 Ultra", precio:5039900, marca:"samsung", img:"https://i.ibb.co/2kR0YkQ/samsung-s26.png"},
{nombre:"Samsung A55", precio:1399000, marca:"samsung", img:"https://i.ibb.co/F4Q1Y5M/samsung-a55.png"},

{nombre:"Xiaomi Redmi Note 13", precio:899000, marca:"xiaomi", img:"https://i.ibb.co/0qzFqZc/xiaomi-redmi.png"},
{nombre:"Motorola G84", precio:1099000, marca:"xiaomi", img:"https://i.ibb.co/y4P3YJz/motorola-g84.png"}

];


/* 🔧 GENERADOR AUTOMÁTICO */
const contenedor = document.getElementById("catalogo");

function render(filtro=""){
  contenedor.innerHTML = "";

  productos
  .filter(p => !filtro || p.marca === filtro)
  .forEach(p => {

    contenedor.innerHTML += `
      <div class="card">
        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/200'">
        <div class="name">${p.nombre}</div>
        <div class="price">$${p.precio.toLocaleString()}</div>
        <a href="https://wa.me/573003228199?text=Quiero ${p.nombre}" class="btn">
        Comprar
        </a>
      </div>
    `;
  });
}

/* FILTRO */
document.getElementById("filtro").addEventListener("change", e=>{
  render(e.target.value);
});

/* INICIAL */
render();

</script>

</body>
</html>
